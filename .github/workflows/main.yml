name: Workflow Node.js App

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Exibir variáveis
        run: |
          echo "Valor da VAR1: ${{ vars.VAR1 }}"
          echo "Valor da VAR2: ${{ vars.VAR2 }}"
          echo "Valor da VAR3: ${{ vars.VAR3 }}"

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test

      - name: Run build (optional)
        run: npm run build --if-present

      - name: Archive production package
        run: zip -r release.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Baixar pacote do GitHub Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Extract package
        run: unzip release.zip

      - name: Login na Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy para Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .